<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>render-core · gallery</title>
  <style>
    body { font-family: Inter, system-ui, -apple-system, sans-serif; background: #f1f5f9; margin: 0; padding: 32px; color: #0f172a; }
    h1 { font-size: 20px; margin: 0 0 4px; }
    p.sub { color: #64748b; margin: 0 0 24px; font-size: 13px; }
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; max-width: 1120px; }
    .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 14px; padding: 14px; box-shadow: 0 1px 3px rgba(0,0,0,.05); }
    .tag { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; color: #0ea5e9; margin-bottom: 8px; }
    .card img { width: 100%; height: auto; display: block; border-radius: 8px; }
    .kpi img { max-width: 340px; }
  </style>
</head>
<body>
  <h1>SlickFast · render-core engine gallery</h1>
  <p class="sub">Every chart below is pure SVG, generated by the engine from a JSON spec — no Chart.js, no canvas.</p>
  <div class="grid">
    <div class="card"><div class="tag">bar</div><img src="sample-bar.svg" alt="bar" /></div>
    <div class="card"><div class="tag">line · multi-series</div><img src="sample-line.svg" alt="line" /></div>
    <div class="card"><div class="tag">area</div><img src="sample-area.svg" alt="area" /></div>
    <div class="card"><div class="tag">smooth · dark background</div><img src="sample-smooth.svg" alt="smooth" /></div>
    <div class="card"><div class="tag">stacked area</div><img src="sample-stackedarea.svg" alt="stacked area" /></div>
    <div class="card"><div class="tag">difference</div><img src="sample-difference.svg" alt="difference" /></div>
    <div class="card"><div class="tag">slope · first vs last</div><img src="sample-slope.svg" alt="slope" /></div>
    <div class="card"><div class="tag">pie</div><img src="sample-pie.svg" alt="pie" /></div>
    <div class="card"><div class="tag">donut</div><img src="sample-donut.svg" alt="donut" /></div>
    <div class="card kpi"><div class="tag">kpi tile</div><img src="sample-kpi.svg" alt="kpi" /></div>
  </div>
</body>
</html>
